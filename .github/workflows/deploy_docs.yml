name: Deploy Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/CrestApps.Core.Docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/CrestApps.Core.Docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create versioned docs on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          FULL_VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract major.minor for the doc version (e.g., v3.1.0 -> 3.1.x)
          MAJOR="$(echo "$FULL_VERSION" | cut -d. -f1)"
          MINOR="$(echo "$FULL_VERSION" | cut -d. -f2)"
          DOC_VERSION="${MAJOR}.${MINOR}.x"
          echo "Creating docs version ${DOC_VERSION}"
          npx docusaurus docs:version "${DOC_VERSION}"

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: src/CrestApps.Core.Docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
