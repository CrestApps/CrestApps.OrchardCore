name: Contact Center - Feature Activation Matrix

on:
  pull_request:
    branches: [ main, release/** ]
    paths:
      - '.github/contact-center/**'
      - '.github/workflows/contact_center_feature_activation_matrix.yml'
      - 'CrestApps.OrchardCore.slnx'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'src/**'
      - 'tests/CrestApps.OrchardCore.ContactCenter.FeatureActivationTests/**'
  push:
    branches: [ main, release/** ]
    paths:
      - '.github/contact-center/**'
      - '.github/workflows/contact_center_feature_activation_matrix.yml'
      - 'CrestApps.OrchardCore.slnx'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'src/**'
      - 'tests/CrestApps.OrchardCore.ContactCenter.FeatureActivationTests/**'

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  fresh-tenant-activation:
    name: Fresh Tenant Activation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Run Contact Center feature activation matrix
        run: >-
          dotnet test
          -c Release
          -p:NuGetAudit=false
          --logger "trx;LogFileName=contact-center-feature-activation.trx"
          --results-directory ./artifacts/TestResults/ContactCenterFeatureActivation
          ./tests/CrestApps.OrchardCore.ContactCenter.FeatureActivationTests/CrestApps.OrchardCore.ContactCenter.FeatureActivationTests.csproj
      - name: Upload feature activation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: contact-center-feature-activation-results
          path: artifacts/TestResults/ContactCenterFeatureActivation
          if-no-files-found: error
          retention-days: 14
