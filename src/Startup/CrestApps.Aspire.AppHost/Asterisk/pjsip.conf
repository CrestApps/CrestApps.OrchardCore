; WebRTC smoke check after startup:
; - wss://localhost:8089/ws is reachable with the self-signed certificate from the Dockerfile.
; - `pjsip show transports` lists transport-wss.
; - `pjsip show endpoint dev-webrtc` shows DTLS-SRTP, ICE, RTCP mux, and opus/ulaw only.

[global]
type=global
user_agent=CrestApps-Asterisk-WebRTC

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

[webrtc-endpoint](!)
type=endpoint
context=default
transport=transport-wss
disallow=all
allow=opus,ulaw
webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_auto_generate_cert=yes
ice_support=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[dev-webrtc](webrtc-endpoint)
auth=dev-webrtc
aors=dev-webrtc
callerid=CrestApps WebRTC <7001>

[dev-webrtc]
type=auth
auth_type=userpass
username=dev-webrtc
password=crestapps-dev

[dev-webrtc]
type=aor
max_contacts=5
remove_existing=yes
