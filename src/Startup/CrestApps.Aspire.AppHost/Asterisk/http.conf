[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088

; WSS for WebRTC. The local Dockerfile generates this development-only
; self-signed certificate at image build time; replace it for shared environments.
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/keys/asterisk.pem
tlsprivatekey=/etc/asterisk/keys/asterisk.key
